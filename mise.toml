#:schema https://mise.jdx.dev/schema/mise.json

[tools]
terraform = "1.14.6"
tflint    = "0.61.0"
python    = "3.11.15"
uv        = "0.10.11"

[env]
_.source = ".env"
TF_VAR_KeyName = "{{ exec(command='aws ec2 describe-key-pairs --query \"KeyPairs[].KeyName\" --output text') }}"
TF_VAR_ssh_access_cidr = "{{ exec(command='curl -s ipinfo.io/ip') }}/32"

[tasks.serve]
run = "source .venv/bin/activate && mkdocs serve"

[tasks.build]
run = "uv run mkdocs build"
