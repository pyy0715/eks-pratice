# Project information
site_name: AWS EKS Workshop Study (AEWS)
site_url: https://pyy0715.github.io/eks-pratice/

# Repository
repo_url: https://github.com/pyy0715/eks-pratice
repo_name: pyy0715/eks-pratice

# Configuration
theme:
  name: material
  language: ko
  features:
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    # - header.autohide
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    # - navigation.prune
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - toc.integrate
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch-off
        name: Switch to system preference

  icon:
    logo: material/kubernetes
    repo: fontawesome/brands/github

  font:
    text: Roboto
    code: Roboto Mono

# Extensions
markdown_extensions:
  - tables
  - admonition
  - footnotes
  - attr_list
  - md_in_html
  - def_list
  - abbr
  - toc:
      toc_depth: 3
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shortener: true
      repo_url_shorthand: true
      user: pyy0715
      repo: eks-pratice
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.snippets:
      auto_append:
        - docs/_includes/abbreviations.md
  - pymdownx.blocks.caption

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# Plugins
plugins:
  - search:
      lang:
        - en
        - ko

# Page tree
nav:
  - Home: index.md
  - Week 1:
      - week1/index.md
      - Architecture: week1/1_architecture.md
      - Data Plane: week1/2_data-plane.md
      - Add-ons & Capabilities: week1/3_addons.md
      - Authentication: week1/4_authentication.md
      - Endpoint Access: week1/5_endpoint-access.md
      - Worker Node: week1/6_worker-node.md
      - Lab: week1/7_lab.md
  - Week 2:
      - week2/index.md
      - Background: week2/0_background.md
      - VPC CNI Architecture: week2/1_vpc-cni.md
      - IP Allocation Modes: week2/2_ip-modes.md
      - Pod Capacity: week2/3_pod-capacity.md
      - Pod Networking: week2/4_pod-networking.md
      - Service Networking: week2/5_service-dns.md
      - Load Balancer Controller & ExternalDNS: week2/6_load-balancer.md
      - Lab: week2/8_lab.md
  - Week 3:
      - week3/index.md
      - Overview: week3/1_overview.md
      - Pod Autoscaling: week3/2_pod-autoscaling.md
      - Node Autoscaling: week3/3_node-autoscaling.md
      - Karpenter: week3/4_karpenter.md
      # - Fargate: week3/5_fargate.md
