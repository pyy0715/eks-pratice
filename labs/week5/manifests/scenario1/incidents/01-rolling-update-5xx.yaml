# INCIDENT #1 — Rolling Update 5xx After Gateway Cutover
#
# 배경:
#   Ingress 시절에는 namespace label 로 readiness gate 조건이 자동으로 추가되고, preStop sleep + 긴 grace period
#   조합으로 rolling update 를 무중단으로 유지했다. Gateway API 로 전환하면서 이 구성이 그대로 작동한다고 가정했지만,
#   AWS LBC 공식 문서는 Gateway API 워크로드의 readiness gate 자동 추가 여부를 명시적으로 다루지 않는다.
#   이 매니페스트는 "readiness gate 가 없고 preStop 도 짧을 때 rolling update 5xx 가 왜 발생하는가" 를 재현하기 위해
#   preStop 과 긴 grace period 를 제거한 Deployment 를 덮어쓴다.
#
# 재현 절차:
#   1) kubectl apply -f 01-rolling-update-5xx.yaml        (이 파일)
#   2) kubectl -n demo get pod -l app=nginx \
#        -o jsonpath='{.items[0].spec.readinessGates}'    (빈 배열이면 자동 추가 안 된 상태)
#   3) 별도 터미널에서 curl 루프로 5xx 모니터
#        while true; do curl -so /dev/null -w "%{http_code}\n" https://gw.${MyDomain}/; sleep 0.2; done
#   4) kubectl -n demo set image deploy/nginx nginx=public.ecr.aws/nginx/nginx:1.28-alpine
#   5) curl 루프에서 5xx 가 섞여 나오는 구간 확인
#
# 복구:
#   kubectl apply -f ../00-baseline/app-deployment.yaml   (preStop + 60s grace period 복원)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: demo
spec:
  replicas: 4
  selector:
    matchLabels:
      app: nginx
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0
  template:
    metadata:
      labels:
        app: nginx
    spec:
      # 의도적 오설정 — Ingress 시절의 preStop sleep, 긴 terminationGracePeriodSeconds 가 모두 빠진 상태
      terminationGracePeriodSeconds: 5
      containers:
        - name: nginx
          image: public.ecr.aws/nginx/nginx:1.27-alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
