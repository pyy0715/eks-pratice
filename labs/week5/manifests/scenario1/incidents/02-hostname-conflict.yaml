# INCIDENT #2 — Hostname Claim Conflict During Coexistence
#
# 배경:
#   마이그레이션 공존 구간에 Gateway 쪽 HTTPRoute 가 기존 Ingress 와 같은 hostname (nginx.${MyDomain}) 을
#   잠시 claim 한 상태다. External-DNS 는 Ingress 와 HTTPRoute 두 source 를 독립적으로 보고,
#   같은 hostname 을 두 source 가 claim 하면 reconcile 마다 record 가 flip 한다.
#
# 재현 절차:
#   1) envsubst < 02-hostname-conflict.yaml | kubectl apply -f -
#   2) for i in 1 2 3 4 5; do dig +short nginx.${MyDomain}; sleep 3; done
#      → A record 값이 두 ALB 사이에서 바뀌어 나옴
#   3) kubectl -n external-dns logs deploy/external-dns --tail=100 | grep nginx
#      → Ingress, HTTPRoute 두 source 가 번갈아 update 하는 로그 확인
#
# 복구:
#   envsubst < ../20-migration/httproute.yaml | kubectl apply -f -
#   (HTTPRoute hostname 을 gw.${MyDomain} 로 되돌려 source 경합 제거)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nginx
  namespace: demo
spec:
  parentRefs:
    - name: demo-gw
      sectionName: https
  hostnames:
    - nginx.${MyDomain}    # 의도적 충돌 — Ingress 가 사용 중인 hostname 과 동일
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: nginx
          port: 80
