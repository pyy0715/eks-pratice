# Canary shift — 기존 Ingress(nginx)와 새 Gateway로 전환 중인 서비스(nginx-v2)의 가중치 분배
# backendRefs의 weight 합이 100이 되도록 조정 (ALB Controller는 weight sum에 맞춰 target group 가중치 설정)
# 운영 전환 예: 90/10 → 50/50 → 10/90 → 0/100
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nginx-canary
  namespace: demo
spec:
  parentRefs:
    - name: demo-gw
      sectionName: https
  hostnames:
    - gw.${MyDomain}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: nginx
          port: 80
          weight: 90
        - name: nginx-v2
          port: 80
          weight: 10
