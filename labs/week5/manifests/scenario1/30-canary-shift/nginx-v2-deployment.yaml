# Canary 테스트용 v2 Deployment + Service
# httproute-weighted.yaml 이 nginx-v2 backend 를 참조하므로 사전 배포 필요
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-v2
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-v2
  template:
    metadata:
      labels:
        app: nginx-v2
    spec:
      containers:
        - name: nginx
          image: public.ecr.aws/nginx/nginx:1.28-alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-v2
  namespace: demo
spec:
  type: ClusterIP
  selector:
    app: nginx-v2
  ports:
    - port: 80
      targetPort: 80
