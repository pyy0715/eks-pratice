# INCIDENT #2 вҖ” NodeClaim Launch Failure
# EC2NodeClassм—җ нӢҖлҰ° IAM role мқҙлҰ„ вҶ’ EC2 RunInstances API нҳём¶ң мӢӨнҢЁ
# лҳҗлҠ” мқёмҠӨн„ҙмҠӨк°Җ мғқм„ұлҗҳм–ҙлҸ„ kubeletмқҙ EKS APIм—җ мқёмҰқн•ҳм§Җ лӘ»н•ҙ л…ёл“ңк°Җ joinн•ҳм§Җ лӘ»н•Ё
#
# мҰқмғҒ:
#   - kubectl get nodeclaim вҶ’ NodeClaimмқҙ LaunchFailed мғҒнғң
#   - kubectl get nodes вҶ’ мғҲ л…ёл“ңк°Җ лӮҳнғҖлӮҳм§Җ м•ҠмқҢ
#   - Podмқҙ Pending мғҒнғңлЎң лӮЁмқҢ
#
# м§„лӢЁ:
#   kubectl get nodeclaim -o wide
#   kubectl describe nodeclaim <name> вҶ’ status.conditionsм—җм„ң м—җлҹ¬ л©”мӢңм§Җ нҷ•мқё
#   kubectl get events -A --field-selector reason=LaunchFailed
#   kubectl -n kube-system logs deploy/karpenter --tail=100 | grep -i "launch\|instance\|iam"
#
# ліөкө¬:
#   kubectl delete nodepool broken
#   kubectl delete ec2nodeclass broken
#   kubectl delete deploy trigger-broken -n default
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: broken
spec:
  # IAM role мқҙлҰ„м—җ мҳӨнғҖ вҖ” мӢӨм ң roleмқҖ KarpenterNodeRole-${CLUSTER_NAME}
  # RunInstances APIк°Җ InvalidParameterValue м—җлҹ¬лҘј л°ҳнҷҳн•ҳкұ°лӮҳ
  # мқёмҠӨн„ҙмҠӨк°Җ мғқм„ұлҗҳм–ҙлҸ„ kubeletмқҙ мқёмҰқм—җ мӢӨнҢЁ
  role: "KarpenterNodeRole-typo-wrong-name"
  amiSelectorTerms:
    - alias: "al2023@latest"
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "${CLUSTER_NAME}"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "${CLUSTER_NAME}"
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: broken
spec:
  template:
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m", "r"]
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: broken
      expireAfter: 720h
  limits:
    cpu: 100
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m
    budgets:
      - nodes: "10%"
---
# broken NodePoolм—җ мҠӨмјҖмӨ„лҗҳлҸ„лЎқ nodeSelector м§Җм •
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trigger-broken
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trigger-broken
  template:
    metadata:
      labels:
        app: trigger-broken
    spec:
      nodeSelector:
        karpenter.sh/nodepool: broken
      containers:
        - name: pause
          image: public.ecr.aws/eks-distro/kubernetes/pause:3.7
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
