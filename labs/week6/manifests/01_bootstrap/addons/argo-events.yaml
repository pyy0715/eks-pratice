apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: argo-events
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            enable_argo_events: "true"
  template:
    metadata:
      name: argo-events-{{name}}
      annotations:
        argocd.argoproj.io/sync-wave: "-10"
    spec:
      project: addons
      source:
        repoURL: https://argoproj.github.io/argo-helm
        chart: argo-events
        targetRevision: 2.4.13
        helm:
          releaseName: argo-events
      destination:
        server: '{{server}}'
        namespace: argo-events
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
