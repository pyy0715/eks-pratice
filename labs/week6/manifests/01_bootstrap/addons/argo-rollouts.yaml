apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: argo-rollouts
  namespace: argocd
spec:
  generators:
    - clusters:
        selector:
          matchLabels:
            enable_argo_rollouts: "true"
  template:
    metadata:
      name: argo-rollouts-{{name}}
      annotations:
        argocd.argoproj.io/sync-wave: "-10"
    spec:
      project: addons
      source:
        repoURL: https://argoproj.github.io/argo-helm
        chart: argo-rollouts
        targetRevision: 2.37.7
        helm:
          releaseName: argo-rollouts
      destination:
        server: '{{server}}'
        namespace: argo-rollouts
      ignoreDifferences:
        # Helm chart 가 명시한 preserveUnknownFields: false 를 K8s API server 가
        # 기본값이라 응답에서 생략 → desired/live drift 가 영구 발생하는 이슈 회피.
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          jsonPointers:
            - /spec/preserveUnknownFields
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
