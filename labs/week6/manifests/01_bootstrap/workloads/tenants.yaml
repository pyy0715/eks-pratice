apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tenants
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: workloads
  source:
    repoURL: https://github.com/CHANGE-ME/gitops-lab.git
    targetRevision: main
    path: manifests/02_tenants
    directory:
      include: 'appset-tenants.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
