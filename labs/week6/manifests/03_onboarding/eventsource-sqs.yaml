apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: tenant-onboarding
  namespace: argo-events
spec:
  template:
    serviceAccountName: argo-events-sa
  sqs:
    default:
      # Replace region/queue with values from `terraform output`.
      # Pod Identity grants the ReceiveMessage/DeleteMessage permissions (see iam.tf).
      region: ap-northeast-2
      queue: week6-argocd-tenant-onboarding
      waitTimeSeconds: 20
      jsonBody: true
