apiVersion: argoproj.io/v1alpha1
kind: Sensor
metadata:
  name: tenant-onboarding
  namespace: argo-events
spec:
  template:
    serviceAccountName: argo-events-sa
  dependencies:
    - name: sqs-event
      eventSourceName: tenant-onboarding
      eventName: default
  triggers:
    - template:
        name: run-tenant-onboarding
        argoWorkflow:
          operation: submit
          source:
            resource:
              apiVersion: argoproj.io/v1alpha1
              kind: Workflow
              metadata:
                generateName: tenant-onboarding-
              spec:
                workflowTemplateRef:
                  name: tenant-onboarding
                arguments:
                  parameters:
                    - name: tenant
                      value: "placeholder"
                    - name: tier
                      value: "basic"
          parameters:
            - src:
                dependencyName: sqs-event
                dataKey: body.tenant_id
              dest: spec.arguments.parameters.0.value
            - src:
                dependencyName: sqs-event
                dataKey: body.tier
              dest: spec.arguments.parameters.1.value
