apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: php-apache-prometheus-scaled
spec:
  minReplicaCount: 0
  maxReplicaCount: 10
  pollingInterval: 15
  cooldownPeriod: 30
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: php-apache
  triggers:
  - type: prometheus
    metadata:
      serverAddress: http://kube-prometheus-stack-prometheus.monitoring.svc:9090
      query: sum(rate(container_cpu_usage_seconds_total{namespace="keda",container="php-apache"}[2m]))
      threshold: "0.1"
      activationThreshold: "0.01"
